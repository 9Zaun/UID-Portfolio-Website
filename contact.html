<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contacts page of portolio">
    <title>Contact: Jayanth Jayaprakash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <section class="section section-dark"
        style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="container">
            <div class="split">
                <img src="images/quantum_pc_fr.jpg" alt="Quantum computer" class="img-side">
                <div class="split-text">
                    <h1 class="headline">Contact Me</h1>
                    <p class="subheadline" style="margin-top: var(--space-md); max-width: 560px;">
                        Have a project in mind or want to connect? Send a message.
                    </p>
                </div>
            </div>
        </div>
    </section>

    <nav class="nav">
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="skills.html">Skills</a>
        <a href="contact.html">Contact</a>
    </nav>

    <section class="section">
        <div class="container">
            <form class="form" action="#" method="POST">

                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="+91 00000 00000">
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" placeholder="What's up?" required></textarea>
                </div>

                <button type="submit" class="btn">Send Message</button>

            </form>
        </div>
    </section>

</body>

</html>
